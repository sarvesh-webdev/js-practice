<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <meta name="author" content="sarvesh">
    <meta name="description" content="reamking calculator project using function">
    <!--css links-->
    <link rel="stylesheet" href="calculator.css">
    <title>calculator project final</title>
</head>
<body>
    <header><h1>calculator project(using eval())</h1></header>
<main>
   <p class="result-text" id="result"></p>
    <div class="button-container">
         
        <div>
            <button onclick=" updateCalculation('1'); handleCalculation();">1</button>
            <button onclick=" updateCalculation('2'); handleCalculation();">2</button>
            <button onclick=" updateCalculation('3'); handleCalculation();">3</button>
            <button class="sign-btn" onclick=" updateCalculation('+'); handleCalculation();">+</button>
        </div>
        <div>
            <button onclick=" updateCalculation('4'); handleCalculation();">4</button>
            <button onclick=" updateCalculation('5'); handleCalculation();">5</button>
            <button onclick=" updateCalculation('6'); handleCalculation();">6</button>
            <button class="sign-btn" onclick=" updateCalculation('-'); handleCalculation();">-</button>
        </div>
        <div>
            <button onclick=" updateCalculation('7'); handleCalculation();">7</button>
            <button onclick=" updateCalculation('8'); handleCalculation();">8</button>
            <button onclick=" updateCalculation('9'); handleCalculation();">9</button>
            <button class="sign-btn" onclick=" updateCalculation('*'); handleCalculation();">*</button>
        </div>
        <div>
            <button onclick=" updateCalculation('0'); handleCalculation();">0</button>
            <button onclick=" updateCalculation('.'); handleCalculation();">.</button>
            <button onclick=" evaluateCalculation();
            handleCalculation();">=</button>
            <button class="sign-btn" onclick=" updateCalculation('/'); handleCalculation();">/</button>
        </div>
        <button class="clear-btn" onclick="clearCalculation(); handleCalculation();" >clear</button>

    </div> 
</main>
<footer><p>&copy; 2026 Sarvesh</p></footer>
  <!--js code below-->  
  <script>
    let calculation = localStorage.getItem('calculation') ||'';
    document.getElementById('result').textContent = calculation;
    function updateCalculation(value){
      calculation += value;
      
    }
    function clearCalculation(){
        calculation = '';
        localStorage.removeItem('calculation');  // learn it during objecet topic how to use local storage updating the project here
    }
    function evaluateCalculation(){
        calculation = eval(calculation);
    }

    function handleCalculation(){
     localStorage.setItem('calculation',calculation);
     document.getElementById('result').textContent = calculation;
    }
  </script>
</body>
</html>
