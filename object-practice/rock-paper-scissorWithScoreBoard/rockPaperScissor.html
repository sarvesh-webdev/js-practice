<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Sarvesh">
    <meta name="description" content="Remaking rock paper scissor project ,adding score board to it and storing it in localStorage so that score doesnt get reset when page is refresh">
    <title>RockPaperScissor with score board Project 
    </title>
    <!--css links-->
    <link rel="stylesheet" href="RockPaperScissorWithScoreboard.css">
</head>
<body>
   <header>
    <h1>Rock Paper Scissor Project Remake using function</h1> 
   </header>
   <main>
    <p>You are playing with computer select one of the below option.</p>
    <div class="button-container">
    <button onclick="
        playMove('rock');
        
        "><img src="../img-folder/rock-img.jpg" alt="rock-img"></button>
    <button onclick="
    playMove('paper');
    ">
        <img src="../img-folder/paper-img.jpg" alt="paper-img">
    </button>
    <button onclick="
    playMove('scissor');
    ">
    <img src="../img-folder/scissor-img.jpg" alt="scissor-img">
    </button>
   </div>
   <section>
    <p id="output" class="output-display">output here</p>
    
    <table>
        <tr>
            <th>wins</th>
            <th>loses</th>
            <th>tie</th>
        </tr>
        <tr>
            <td id="win">0</td>
            <td id="lose">0</td>
            <td id="tie">0</td>
        </tr>
    </table>
    <button class="reset-button" onclick="resetScore();">Reset</button>
</section>
    
    
    
</main>
   <footer> <p>&copy; 2026 Sarvesh</p> </footer>

<script>
    const score = JSON.parse(localStorage.getItem('score')) || {
      wins:0, 
      lose:0,
      tie:0
    };

    document.getElementById("win").textContent = score.wins;
    document.getElementById("lose").textContent = score.lose;
    document.getElementById("tie").textContent = score.tie;

    const output = localStorage.getItem('output');
    if(output){
        document.getElementById("output").innerHTML = output;
    }
    function generateComputerMove(){
        let randomNum = Math.random();
        if(randomNum < 1/3){
            return 'rock';
        }else if(randomNum <2/3 && randomNum >= 1/3){
            return 'paper';
        }else if(randomNum >= 2/3){
                 return 'scissor';
        }
    }

    function resetScore(){
        score.wins = 0;
        score.lose = 0;
        score.tie = 0;
        document.getElementById("win").textContent = score.wins;
        document.getElementById("lose").textContent = score.lose;
        document.getElementById("tie").textContent = score.tie;
        document.getElementById("output").innerHTML = "output here";
        saveScore();
    }

    function generateResult(myMove,computerMove){
        if(myMove === computerMove ){
            score.tie++;
            return 'Tie';
        }else if(
           (myMove === 'rock' && computerMove === 'paper' ) || (myMove === 'paper' && computerMove === 'scissor') || (myMove === 'scissor' && computerMove === 'rock') ){
            score.lose++;
            return 'You lose';
        }else{
            score.wins++;
            return 'You win';
        }

        
    }
  
    function playMove(myMove){
        let computerMove = generateComputerMove();
        document.getElementById("output").innerHTML =
        `your choice: ${myMove} <br>
        computer choice: ${computerMove}
        <br> ${generateResult(myMove,computerMove)}`;

        document.getElementById("win").textContent = score.wins;
        document.getElementById("lose").textContent = score.lose;
        document.getElementById("tie").textContent = score.tie;

        saveScore();

    }

    function saveScore(){
        localStorage.setItem('score',JSON.stringify(score));
        localStorage.setItem('output',document.getElementById("output").innerHTML);
    }
</script>   
</body>

</html>
