        <h2>1. select current aprox time.it will pop appropriate message for current time.</h2>
        <button onclick="
        currentTime = (6+12)/2; // for average time

        if(currentTime >=6 && currentTime <=12){
            alert('Good morning!');
        }else if(currentTime >= 13 && currentTime <= 17){
            alert('Good Afternoon!');

            alert('Good night!');
        }

        <h2>3. Guess whether the tossed coin is head or tails .</h2>
        <button onclick="
        let tossedCoin = Math.random();
        let result = '';
        if(tossedCoin >0.5){
            tossedCoin = 'heads';
        }else if(tossedCoin <=0.5){
            tossedCoin = 'tails';
        }

        if(tossedCoin === 'heads'){
             result = 'You win';
        } else if (tossedCoin === 'tails'){
            result = 'You lose';
        }
        alert(`you guessed heads. the result of coin toss was ${tossedCoin}.${result}.`)
        ">Heads</button>
        <button onclick="
        let tossedCoin2 = Math.random();
        let result2 = '';
        if(tossedCoin2 >0.5){
            tossedCoin2 = 'heads';
        }else if(tossedCoin2 <= 0.5){
            tossedCoin2 = 'tails';
        }

        result2 = tossedCoin2 === 'heads' ? 'You lose': 'You win';
        alert(`you guessed heads. the result of coin toss was ${tossedCoin2}.${result2}.`) ">Tails</button>
