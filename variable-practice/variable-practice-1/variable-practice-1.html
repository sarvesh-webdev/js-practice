    <main>
        <div class="img-container"><img src="../variable-practice-img/Shopping-Cart-PNG-Image-HD.png" alt="cart-img"></div>
        <div class="button-container">
          
            <div class="button-container-topSection"> 
             <button onclick=" 
             cartQuantity++;
             console.log(`Cart quantity:${cartQuantity}`); 
             ">Add to cart</button>
             <button onclick="
              cartQuantity += 2;
              console.log(`Cart quantity:${cartQuantity}`); 
             ">+2</button>
             <button onclick="
             cartQuantity +=3;
             console.log(`Cart quantity:${cartQuantity}`); 
             ">+3</button>
            </div>
            <button onclick="
            cartQuantity = 0;
            console.log(`Cart quantity Reset \n Cart quantity:${cartQuantity}`); 
            " class="reset-button">Reset</button>
        </div>
    </main>
